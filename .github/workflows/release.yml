name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare binary
        run: |
          cp optimize-lottie.bb optimize-lottie
          chmod +x optimize-lottie

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: optimize-lottie
          generate_release_notes: true
