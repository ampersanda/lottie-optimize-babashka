name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install

      - name: Install ImageMagick 7
        run: |
          curl -sL https://imagemagick.org/archive/binaries/magick -o magick
          chmod +x magick
          sudo mv magick /usr/local/bin/

      - name: Install cwebp
        run: sudo apt-get install -y webp

      - name: Verify tools
        run: |
          bb --version
          magick --version
          cwebp -version

      - name: Run tests
        run: bash test/run.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install

      - name: Prepare binary
        run: |
          bb uberscript optimize-lottie optimize-lottie.bb
          sed -i '1i#!/usr/bin/env bb' optimize-lottie
          chmod +x optimize-lottie

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: optimize-lottie
          generate_release_notes: true
